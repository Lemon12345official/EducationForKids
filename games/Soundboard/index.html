<!DOCTYPE html>
<html>
<head>
    <title>Soundboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
        }

        #topbar {
            position: sticky;
            top: 0;
            background: #222;
            padding: 10px;
            z-index: 1000;
        }

        #search {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: none;
            font-size: 16px;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .instant {
            text-align: center;
        }

        .instant a {
            color: white;
            text-decoration: none;
            display: block;
            margin-top: 6px;
            font-size: 14px;
        }

        .small-button {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
        }

        #pagination {
            text-align: center;
            padding: 20px;
        }

        #pagination button {
            padding: 10px 20px;
            margin: 0 10px;
            background: #333;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 6px;
        }
    </style>
</head>

<body>

    <div id="topbar">
        <input id="search" type="text" placeholder="Search sounds...">
    </div>

    <div id="grid"></div>

    <div id="pagination">
        <button id="prev">Previous</button>
        <button id="next">Next</button>
    </div>

    <script>
        let allSounds = [];
        let currentPage = 1;
        const perPage = 30;

        function playSound(url) {
            let audio = new Audio(url);
            audio.play();
        }

        function renderPage() {
            const grid = document.getElementById("grid");
            grid.innerHTML = "";

            let start = (currentPage - 1) * perPage;
            let end = start + perPage;

            let pageItems = allSounds.slice(start, end);

            pageItems.forEach(item => {
                grid.appendChild(item);
            });
        }

        function applySearch() {
            let q = document.getElementById("search").value.toLowerCase();

            if (q === "") {
                allSounds.forEach(el => el.style.display = "block");
                renderPage();
                return;
            }

            allSounds.forEach(el => {
                let label = el.querySelector("a").innerText.toLowerCase();
                el.style.display = label.includes(q) ? "block" : "none";
            });
        }

        document.getElementById("search").addEventListener("input", applySearch);

        document.getElementById("prev").onclick = () => {
            if (currentPage > 1) {
                currentPage--;
                renderPage();
            }
        };

        document.getElementById("next").onclick = () => {
            if (currentPage < Math.ceil(allSounds.length / perPage)) {
                currentPage++;
                renderPage();
            }
        };

        window.onload = () => {
            let container = document.createElement("div");
            container.innerHTML = `
                <!-- PASTE ALL YOUR <div class="instant">...</div> BUTTONS HERE -->
            `;

            allSounds = Array.from(container.children);
            renderPage();
        };
    </script>

</body>
</html>
